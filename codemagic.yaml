workflows:
  my-workflow:
    environment:
      flutter: stable
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache  
    artifacts:
      - build/host/outputs/repo/**/**/*.pom
      - build/host/outputs/repo/**/**/*.aar
    scripts:
      - name: Build Android AAR
        script: flutter build aar
    publishing:
    scripts:
    - name: unzip
      script: |
        aarPath=$(find build -name "*.aar")
        echo 'path${aarPath}'
    - name: Report build status
      script: | 
        if [  -f ~/SUCCESS ] ; then
           # build successful
        else
           # build failed
        fi
